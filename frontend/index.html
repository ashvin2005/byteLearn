<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/bytelearn-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ByteLearn is an AI-powered personalized learning platform that converts syllabus and textbooks into adaptive, bite-sized learning paths." />
    <title>ByteLearn</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(success) {
              if (success) console.log('Unregistered stale service worker:', registration.scope);
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  <script type="module" src="./node_modules/lodash/lodash.min.js"></script>
</html>
